  <rect x="48" y="48" width="928" height="928" rx="205" fill="url(#background)"/>
  <rect x="65" y="65" width="894" height="894" rx="190" fill="none" stroke="#343c42" stroke-width="8"/>

  <g transform="rotate(-5 512 512)">
