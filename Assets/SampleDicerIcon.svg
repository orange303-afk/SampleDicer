<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="background" x1="120" y1="80" x2="900" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#252a2e"/>
      <stop offset="0.55" stop-color="#101316"/>
      <stop offset="1" stop-color="#0a0c0e"/>
    </linearGradient>
    <linearGradient id="face" x1="260" y1="220" x2="760" y2="805" gradientUnits="userSpaceOnUse">
      <stop stop-color="#26333b"/>
      <stop offset="1" stop-color="#172228"/>
