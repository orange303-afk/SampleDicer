    <rect x="192" y="192" width="640" height="640" rx="148" fill="url(#face)" stroke="#62d9ef" stroke-width="20"/>
    <rect x="217" y="217" width="590" height="590" rx="125" fill="none" stroke="#f2f6f7" stroke-opacity="0.08" stroke-width="6"/>

    <g fill="#28c7e8" opacity="0.38" filter="url(#pipGlow)">
      <circle cx="365" cy="340" r="57"/><circle cx="659" cy="340" r="57"/>
      <circle cx="365" cy="512" r="57"/><circle cx="659" cy="512" r="57"/>
      <circle cx="365" cy="684" r="57"/><circle cx="659" cy="684" r="57"/>
    </g>
    <g fill="#62d9ef">
      <circle cx="365" cy="340" r="48"/><circle cx="659" cy="340" r="48"/>
      <circle cx="365" cy="512" r="48"/><circle cx="659" cy="512" r="48"/>
      <circle cx="365" cy="684" r="48"/><circle cx="659" cy="684" r="48"/>
